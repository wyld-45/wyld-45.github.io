<!DOCTYPE html>
<html>
<head>
  <title>wyld.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #008080;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      user-select: none;
    }

    .desktop {
      width: 100%;
      height: calc(100vh - 40px);
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
      position: relative;
    }

    .icon {
      width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px;
      border-radius: 2px;
      position: relative;
      z-index: 1;
    }
    .icon:hover { background: rgba(255,255,255,0.2); }
    .icon.selected { background: rgba(0,0,128,0.4); outline: 1px dotted white; }

    .icon-img { font-size: 36px; }

    .icon-label {
      color: white;
      font-size: 12px;
      text-align: center;
      text-shadow: 1px 1px 2px black;
    }

    .taskbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 40px;
      background: #c0c0c0;
      border-top: 2px solid white;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 6px;
    }

    .start-btn {
      background: #c0c0c0;
      border-top: 2px solid white;
      border-left: 2px solid white;
      border-right: 2px solid #444;
      border-bottom: 2px solid #444;
      padding: 2px 10px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
    }

    .clock {
      margin-left: auto;
      border-top: 1px solid #444;
      border-left: 1px solid #444;
      border-right: 1px solid white;
      border-bottom: 1px solid white;
      padding: 2px 10px;
      font-size: 12px;
      text-align: right;
      line-height: 1.4;
    }

    #marquee {
      position: absolute;
      border: 1px dotted white;
      background: rgba(0, 0, 255, 0.15);
      pointer-events: none;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <div class="desktop" id="desktop">
    <div class="icon">
      <div class="icon-img">🖥️</div>
      <div class="icon-label">About Me</div>
    </div>
    <div class="icon">
      <div class="icon-img">📡</div>
      <div class="icon-label">Socials</div>
    </div>
    <div class="icon">
      <div class="icon-img">🎬</div>
      <div class="icon-label">Content</div>
    </div>
    <div class="icon">
      <div class="icon-img">🕹️</div>
      <div class="icon-label">Games</div>
    </div>
  </div>

  <div class="taskbar">
    <button class="start-btn">⊞ Start</button>
    <div class="clock" id="clock"></div>
  </div>

  <div id="marquee"></div>

  <script>
    function updateClock() {
      const now = new Date();
      let h = now.getHours(), m = now.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      const time = h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const date = days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
      document.getElementById('clock').innerHTML = time + '<br>' + date;
    }
    updateClock();
    setInterval(updateClock, 10000);

    const desktop = document.getElementById('desktop');
    const marquee = document.getElementById('marquee');
    let startX, startY, dragging = false;

    desktop.addEventListener('mousedown', function(e) {
      if (e.target.closest('.icon')) return;
      dragging = true;
      startX = e.clientX;
      startY = e.clientY;
      marquee.style.display = 'block';
      marquee.style.left = startX + 'px';
      marquee.style.top = startY + 'px';
      marquee.style.width = '0px';
      marquee.style.height = '0px';
      document.querySelectorAll('.icon').forEach(i => i.classList.remove('selected'));
    });

    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      const x = Math.min(e.clientX, startX);
      const y = Math.min(e.clientY, startY);
      const w = Math.abs(e.clientX - startX);
      const h = Math.abs(e.clientY - startY);
      marquee.style.left = x + 'px';
      marquee.style.top = y + 'px';
      marquee.style.width = w + 'px';
      marquee.style.height = h + 'px';

      const mRect = { left: x, top: y, right: x + w, bottom: y + h };
      document.querySelectorAll('.icon').forEach(icon => {
        const r = icon.getBoundingClientRect();
        const overlap = r.left < mRect.right && r.right > mRect.left &&
                        r.top < mRect.bottom && r.bottom > mRect.top;
        icon.classList.toggle('selected', overlap);
      });
    });

    document.addEventListener('mouseup', function() {
      dragging = false;
      marquee.style.display = 'none';
    });
  </script>

</body>
</html>
