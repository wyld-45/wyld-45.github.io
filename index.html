<!DOCTYPE html>
<html>
<head>
  <title>wyld.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #008080;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .desktop {
      width: 100%;
      height: calc(100vh - 40px);
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
    }

    .icon {
      width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px;
      border-radius: 2px;
    }
    .icon:hover { background: rgba(255,255,255,0.2); }

    .icon-img { font-size: 36px; }

    .icon-label {
      color: white;
      font-size: 12px;
      text-align: center;
      text-shadow: 1px 1px 2px black;
    }

    .taskbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 40px;
      background: #c0c0c0;
      border-top: 2px solid white;
      display: flex;
      align-items: center;
      padding: 0 6px;
      gap: 6px;
    }

    .start-btn {
      background: #c0c0c0;
      border-top: 2px solid white;
      border-left: 2px solid white;
      border-right: 2px solid #444;
      border-bottom: 2px solid #444;
      padding: 2px 10px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
    }

    .clock {
      margin-left: auto;
      border-top: 1px solid #444;
      border-left: 1px solid #444;
      border-right: 1px solid white;
      border-bottom: 1px solid white;
      padding: 2px 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="desktop">
    <div class="icon">
      <div class="icon-img">🖥️</div>
      <div class="icon-label">About Me</div>
    </div>
    <div class="icon">
      <div class="icon-img">📡</div>
      <div class="icon-label">Socials</div>
    </div>
    <div class="icon">
      <div class="icon-img">🎬</div>
      <div class="icon-label">Content</div>
    </div>
    <div class="icon">
      <div class="icon-img">🕹️</div>
      <div class="icon-label">Games</div>
    </div>
  </div>

  <div class="taskbar">
    <button class="start-btn">⊞ Start</button>
    <div class="clock" id="clock">12:00 PM</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let h = now.getHours(), m = now.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').textContent =
        h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
    }
    updateClock();
    setInterval(updateClock, 10000);
  </script>

</body>
</html>
